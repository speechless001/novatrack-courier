<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    
    <title>NovaTrack Admin Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef3f8;
            color: #222;
        }

        .topbar {
            background: #0077ff;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 28px;
        }

        .topbar .logout-btn {
            background: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
        }

        .topbar .logout-btn:hover {
            background: #c0392b;
        }

        .nav {
            background: white;
            padding: 15px 40px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.06);
        }

        .nav a {
            text-decoration: none;
            margin-right: 25px;
            color: #0077ff;
            font-weight: bold;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 40px auto;
        }

        .dashboard-title {
            margin-bottom: 25px;
        }

        .dashboard-title h2 {
            margin: 0;
            color: #0077ff;
            font-size: 32px;
        }

        .dashboard-title p {
            color: #666;
            margin-top: 8px;
            font-size: 16px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .card h3 {
            margin-top: 0;
            color: #0077ff;
            margin-bottom: 20px;
        }

        .card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .card button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #0077ff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .card button:hover {
            background: #005ed6;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>NovaTrack Admin</h1>
        <a class="logout-btn" href="/logout">Logout</a>
    </div>

    <div class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/novatrack-admin">Create Shipment</a>
        <a href="/novatrack-update">Update Shipment</a>
    </div>

    <div class="container">
        <div class="dashboard-title">
            <h2>Create Shipment</h2>
            <p>Create a new shipment and automatically generate a NovaTrack tracking number.</p>
        </div>

        <div class="card">
            <h3>New Shipment Details</h3>

            <form method="POST" action="/create-shipment">
<input type="text" name="customer" placeholder="Customer Name" required>
<input type="text" name="origin" placeholder="Origin City" required>
<input type="text" name="destination" placeholder="Destination City" required>
<input type="text" name="status" placeholder="Status (Shipment Created, In Transit...)" required> 

<button type="submit">Create Shipment</button>
            </form>
        </div>
    </div>

</body>
</html>
