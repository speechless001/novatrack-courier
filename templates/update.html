<!DOCTYPE html>
<html>
<head>
    <title>NovaTrack Update Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef3f8;
            color: #222;
        }

        .topbar {
            background: #0077ff;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 28px;
        }

        .topbar .logout-btn {
            background: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
        }

        .topbar .logout-btn:hover {
            background: #c0392b;
        }

        .nav {
            background: white;
            padding: 15px 40px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.06);
        }

        .nav a {
            text-decoration: none;
            margin-right: 25px;
            color: #0077ff;
            font-weight: bold;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 40px auto;
        }

        .dashboard-title {
            margin-bottom: 25px;
        }

        .dashboard-title h2 {
            margin: 0;
            color: #0077ff;
            font-size: 32px;
        }

        .dashboard-title p {
            color: #666;
            margin-top: 8px;
            font-size: 16px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .card h3 {
            margin-top: 0;
            color: #0077ff;
            margin-bottom: 20px;
        }

        .card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .card button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #0077ff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .card button:hover {
            background: #005ed6;
        }
        select {
    width: 100%;
    padding: 12px;
    border: 1px solid #d0d7e2;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 16px;
    box-sizing: border-box;
    background: white;
}
    </style>
</head>
<link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

<body>

    <div class="topbar">
        <h1>NovaTrack Admin</h1>
        <a class="logout-btn" href="/logout">Logout</a>
    </div>

    <div class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/novatrack-admin">Create Shipment</a>
        <a href="/novatrack-update">Update Shipment</a>
    </div>

    <div class="container">
        <div class="dashboard-title">
            <h2>Update Shipment</h2>
            <p>Add a new tracking event and automatically update the shipment’s current status.</p>
        </div>

        <div class="card">
            <h3>Tracking Update Details</h3>

            <form method="POST" action="/add-update">
               <input type="text" name="tracking_number"
       value="{{ request.args.get('tracking', '') }}"
       placeholder="Tracking Number"
       required>
       <label for="tracking_number">Tracking Number</label>
<input type="text" name="tracking_number" id="tracking_number" required>

<label for="message">Update Status</label>
<select name="message" id="message" required>
    <option value="">Select status</option>
    <option value="Shipment Created">Shipment Created</option>
    <option value="In Transit">In Transit</option>
    <option value="Out for Delivery">Out for Delivery</option>
    <option value="Delivered">Delivered</option>
    <option value="Delayed">Delayed</option>
    <option value="Arrived at Facility">Arrived at Facility</option>
</select>

<button type="submit">Add Update</button>

            </form>
        </div>
    </div>

</body>
</html>
