<!DOCTYPE html>
<html>
<head>
    <title>Shipment Created</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        h2 {
            color: #28a745;
        }

        .tracking {
            font-size: 20px;
            font-weight: bold;
            color: #0077ff;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #0077ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #005ed6;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>✅ Shipment Created Successfully</h2>

    <p class="tracking">{{ tracking_number }}</p>

    <p><strong>Customer:</strong> {{ customer }}</p>
    <p><strong>Route:</strong> {{ origin }} → {{ destination }}</p>
    <p><strong>Status:</strong> {{ status }}</p>

    <a class="btn" href="/novatrack-update">Add Update</a>
    <br>
    <a class="btn" href="/dashboard">Go to Dashboard</a>
</div>

</body>
</html>
